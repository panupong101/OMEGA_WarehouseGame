name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          echo "Checking HTML file exists and is valid..."
          test -f src/index.html
          echo "HTML file validated successfully"

      - name: Check file size
        run: |
          SIZE=$(stat -f%z src/index.html 2>/dev/null || stat -c%s src/index.html)
          echo "Build size: ${SIZE} bytes"
          if [ "$SIZE" -gt 10485760 ]; then
            echo "WARNING: File exceeds 10MB"
          fi

  deploy:
    name: Deploy
    needs: lint
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build
        run: |
          mkdir -p _site
          cp -r src/. _site/
          cp -r docs/ _site/docs/ 2>/dev/null || true
          echo "Build complete — files included:"
          find _site -type f

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
